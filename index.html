<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>William Is So Cool</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

header {
    padding:60px 20px;
}

h1 {
    font-size:3rem;
    background:linear-gradient(90deg,#00f5ff,#00ff88);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.section {
    padding:60px 20px;
    max-width:1000px;
    margin:auto;
}

.image-container {
    margin:40px 0;
}

.image-container img {
    width:100%;
    max-width:600px;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.cool-box {
    margin-top:40px;
    padding:40px;
    background:rgba(255,255,255,0.1);
    border-radius:20px;
    font-size:1.5rem;
    font-weight:bold;
}

@media (max-width:768px){
    h1{font-size:2rem;}
    .cool-box{font-size:1.2rem;}
}
</style>
</head>

<body>

<header>
<h1>William Is So Cool 😎</h1>
</header>

<div class="section">

<h2>Night Mode William</h2>
<div class="image-container">
<img src="IMG_3784.jpeg">
</div>

<h2>Adventure William</h2>
<div class="image-container">
<img src="IMG_4032.jpeg">
</div>

<div class="cool-box">
🔥 Official Cool Rating: 1000/10 🔥<br><br>
Built different.
</div>

</div>

</body>
</html>
